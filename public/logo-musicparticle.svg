<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 80" fill="none">
  <defs>
    <!-- Particle glow filter -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Subtle bloom for accent particles -->
    <filter id="bloom" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="3.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Wordmark: "Music" in Instrument Serif italic style weight, "Particle" lighter -->
  <text x="28" y="54" font-family="'Instrument Serif', Georgia, serif" font-style="italic" font-size="46" fill="#e8e4dc" letter-spacing="-0.5">
    <tspan font-weight="400">Music</tspan><tspan font-weight="400" fill="#c4a882">Particle</tspan>
  </text>

  <!-- Particle field: scattered dots suggesting sound-reactive particles -->
  <!-- Leading particles (before text) -->
  <circle cx="8" cy="28" r="1.8" fill="#e85d3a" filter="url(#bloom)" opacity="0.9"/>
  <circle cx="14" cy="42" r="1.2" fill="#c4a882" filter="url(#glow)" opacity="0.7"/>
  <circle cx="6" cy="56" r="1.4" fill="#e8e4dc" opacity="0.4"/>
  <circle cx="18" cy="18" r="1.0" fill="#c4a882" opacity="0.5"/>
  <circle cx="22" cy="64" r="0.8" fill="#e85d3a" opacity="0.6"/>

  <!-- Trailing particles (after text) — dispersing outward -->
  <circle cx="460" cy="20" r="2.0" fill="#e85d3a" filter="url(#bloom)" opacity="0.85"/>
  <circle cx="472" cy="38" r="1.5" fill="#c4a882" filter="url(#glow)" opacity="0.7"/>
  <circle cx="480" cy="55" r="1.8" fill="#e8e4dc" opacity="0.45"/>
  <circle cx="490" cy="26" r="1.0" fill="#c4a882" opacity="0.6"/>
  <circle cx="498" cy="48" r="1.3" fill="#e85d3a" filter="url(#bloom)" opacity="0.5"/>
  <circle cx="505" cy="32" r="0.7" fill="#e8e4dc" opacity="0.35"/>
  <circle cx="510" cy="60" r="0.9" fill="#c4a882" opacity="0.4"/>

  <!-- Mid-field particles (floating around text) -->
  <circle cx="120" cy="12" r="1.1" fill="#e85d3a" opacity="0.5"/>
  <circle cx="200" cy="70" r="1.3" fill="#c4a882" opacity="0.4"/>
  <circle cx="280" cy="8" r="0.9" fill="#e8e4dc" opacity="0.3"/>
  <circle cx="350" cy="72" r="1.0" fill="#e85d3a" opacity="0.45"/>
  <circle cx="410" cy="10" r="1.2" fill="#c4a882" filter="url(#glow)" opacity="0.55"/>

  <!-- Sound wave hint: subtle frequency bars near the "M" -->
  <rect x="12" y="34" width="1.5" height="8" rx="0.75" fill="#c4a882" opacity="0.3"/>
  <rect x="16" y="30" width="1.5" height="16" rx="0.75" fill="#c4a882" opacity="0.25"/>
  <rect x="20" y="32" width="1.5" height="12" rx="0.75" fill="#c4a882" opacity="0.2"/>
</svg>
